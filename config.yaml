prefect:
  api_url: http://127.0.0.1:4200/api

clickhouse:
  host: localhost
  port: 8123
  database: default
  username: default
  secure: false
  connect_timeout: 10
  send_receive_timeout: 300

deploy:
  enabled_modules:
    - tushare_trade_cal
    - tushare_income

  pools:
    default-process-pool:
      type: process
      job_variables:
        env:
          TZ: Asia/Shanghai
          PYTHONPATH: /app
          DO_NOT_TRACK: "1"
          PREFECT_API_URL: "http://prefect-server:4200/api"
        working_dir: /app
        stream_output: true
