module:
  flow_name: tushare_cyq_perf_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_cyq_perf
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-cyq-perf
    name: 股票-筹码胜率
    schedules:
      - cron: "20 19 * * 1-5"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - cyq-perf
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
