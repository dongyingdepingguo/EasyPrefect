module:
  flow_name: tushare_cn_m_flow

runtime:
  clickhouse:
    enabled: true
    table: cn_m
    mode: upsert
    version_column: updated_at

deployments:
  - id: tushare-cn-m
    name: 宏观-货币供应量
    schedules:
      - cron: "20 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - cn-m
      parameters:
        m: ""
        start_m: ""
        end_m: ""
        timeout: 30
