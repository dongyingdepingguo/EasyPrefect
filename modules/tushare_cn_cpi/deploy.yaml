module:
  flow_name: tushare_cn_cpi_flow

runtime:
  clickhouse:
    enabled: true
    table: cn_cpi
    mode: upsert
    version_column: updated_at

deployments:
  - id: tushare-cn-cpi
    name: 宏观-CPI
    schedules:
      - cron: "8 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - cn-cpi
      parameters:
        m: ""
        start_m: ""
        end_m: ""
        timeout: 30
