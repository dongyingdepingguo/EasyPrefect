module:
  flow_name: tushare_stk_factor_pro_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_factor_pro
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - name: tushare-stk-factor-pro
    schedules: []
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - stk-factor-pro
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
