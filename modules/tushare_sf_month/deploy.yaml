module:
  flow_name: tushare_sf_month_flow

runtime:
  clickhouse:
    enabled: true
    table: sf_month
    mode: upsert
    version_column: updated_at

deployments:
  - id: tushare-sf-month
    name: 宏观-月度社融
    schedules:
      - cron: "24 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - sf-month
      parameters:
        m: ""
        start_m: ""
        end_m: ""
        timeout: 30
