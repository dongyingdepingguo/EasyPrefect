module:
  flow_name: tushare_income_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_fina_income
    mode: upsert
    version_column: updated_at
    date_columns:
      - end_date
      - ann_date
      - f_ann_date

deployments:
  - name: tushare-income
    schedules: []
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - income
      parameters:
        ts_code: ""
        ann_date: ""
        f_ann_date: ""
        start_date: ""
        end_date: ""
        period: ""
        report_type: ""
        comp_type: ""
        timeout: 30
