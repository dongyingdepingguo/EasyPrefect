module:
  flow_name: tushare_ci_daily_flow

runtime:
  clickhouse:
    enabled: true
    table: ci_daily
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-ci-daily
    name: 中信行业-日线行情
    schedules:
      - cron: "0 18 * * 1-5"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - ci-daily
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
