module:
  flow_name: tushare_stk_rewards_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_base_rewards
    mode: upsert
    version_column: updated_at
    date_columns:
      - ann_date
      - end_date

deployments:
  - id: tushare-stk-rewards
    name: 股票-管理层薪酬持股
    schedules:
      - cron: "52 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - stk-rewards
      parameters:
        ts_code: ""
        end_date: ""
        timeout: 30
