module:
  flow_name: tushare_fina_mainbz_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_fina_mainbz
    mode: upsert
    version_column: updated_at
    date_columns:
      - end_date

deployments:
  - id: tushare-fina-mainbz
    name: 财务-主营业务构成
    schedules:
      - cron: "44 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - fina_mainbz
      parameters:
        ts_code: ""
        start_date: ""
        end_date: ""
        period: ""
        bz_code: ""
        timeout: 30
