module:
  flow_name: tushare_dividend_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_fina_dividend
    mode: upsert
    version_column: updated_at
    date_columns:
      - end_date
      - ann_date
      - record_date
      - ex_date
      - pay_date
      - div_listdate
      - imp_ann_date
      - base_date

deployments:
  - name: tushare-dividend
    schedules: []
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - dividend
      parameters:
        ts_code: ""
        end_date: ""
        ann_date: ""
        record_date: ""
        ex_date: ""
        imp_ann_date: ""
        timeout: 30
