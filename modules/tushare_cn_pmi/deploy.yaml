module:
  flow_name: tushare_cn_pmi_flow

runtime:
  clickhouse:
    enabled: true
    table: cn_pmi
    mode: upsert
    version_column: updated_at

deployments:
  - id: tushare-cn-pmi
    name: 宏观-PMI
    schedules:
      - cron: "16 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - cn-pmi
      parameters:
        m: ""
        start_m: ""
        end_m: ""
        timeout: 30
