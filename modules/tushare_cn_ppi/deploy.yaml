module:
  flow_name: tushare_cn_ppi_flow

runtime:
  clickhouse:
    enabled: true
    table: cn_ppi
    mode: upsert
    version_column: updated_at

deployments:
  - id: tushare-cn-ppi
    name: 宏观-PPI
    schedules:
      - cron: "12 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - cn-ppi
      parameters:
        m: ""
        start_m: ""
        end_m: ""
        timeout: 30
