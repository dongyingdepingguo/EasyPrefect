module:
  flow_name: tushare_index_weekly_flow

runtime:
  clickhouse:
    enabled: true
    table: index_market_weekly
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-index-weekly
    name: 指数-周线行情
    schedules:
      - cron: "20 20 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - index-weekly
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
