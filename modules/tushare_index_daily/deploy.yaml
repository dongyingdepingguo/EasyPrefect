module:
  flow_name: tushare_index_daily_flow

runtime:
  source:
    index_basic_table: index_base_basic
    markets:
      - CSI
      - SSE
      - SZSE
  clickhouse:
    enabled: true
    table: index_market_daily
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-index-daily
    name: 指数-日线行情
    schedules:
      - cron: "40 17 * * 1-5"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - index-daily
      parameters:
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
