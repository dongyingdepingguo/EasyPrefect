module:
  flow_name: tushare_ci_index_member_flow

runtime:
  clickhouse:
    enabled: true
    table: ci_index_member
    mode: upsert
    version_column: updated_at
    date_columns:
      - in_date
      - out_date

deployments:
  - id: tushare-ci-index-member
    name: 中信行业-成分
    schedules:
      - cron: "4 6 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - ci-index-member
      parameters:
        l1_code: ""
        l2_code: ""
        l3_code: ""
        ts_code: ""
        is_new: ""
        timeout: 30
