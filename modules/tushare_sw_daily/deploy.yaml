module:
  flow_name: tushare_sw_daily_flow

runtime:
  clickhouse:
    enabled: true
    table: sw_daily
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-sw-daily
    name: 申万行业-日线行情
    schedules:
      - cron: "50 17 * * 1-5"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - sw-daily
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
