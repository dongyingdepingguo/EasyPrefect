module:
  flow_name: tushare_stk_week_month_adj_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_market_week_month_adj
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date
      - end_date

deployments:
  - id: tushare-stk-week-adj
    name: 股票-周线复权行情
    schedules:
      - cron: "0 20 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - stk-week-month-adj
        - week
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        freq: week
        timeout: 30

  - id: tushare-stk-month-adj
    name: 股票-月线复权行情
    schedules:
      - cron: "10 20 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - stk-week-month-adj
        - month
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        freq: month
        timeout: 30
