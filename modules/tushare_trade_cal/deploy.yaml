module:
  flow_name: tushare_trade_cal_flow

runtime:
  clickhouse:
    enabled: false
    table: ods_tushare_trade_cal
    mode: upsert
    version_column: _ingested_at
    columns:
      - exchange
      - cal_date
      - is_open
      - pretrade_date
      - _ingested_at

deployments:
  - name: tushare-trade-cal-manual
    schedules: []
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - trade-cal
      parameters:
        exchange: SSE
        start_date: ""
        end_date: ""
        is_open: ""
        fields: exchange,cal_date,is_open,pretrade_date
        timeout: 30
