module:
  flow_name: tushare_trade_cal_flow

runtime:
  clickhouse:
    enabled: true
    table: stock_base_trade_calendar
    mode: upsert
    version_column: updated_at
    date_columns:
      - cal_date
      - pretrade_date

deployments:
  - name: tushare-trade-cal
    schedules: []
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - trade-cal
      parameters:
        exchange: SSE
        start_date: ""
        end_date: ""
        is_open: ""
        timeout: 30
