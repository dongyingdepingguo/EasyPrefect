module:
  flow_name: tushare_index_monthly_flow

runtime:
  clickhouse:
    enabled: true
    table: index_market_monthly
    mode: upsert
    version_column: updated_at
    date_columns:
      - trade_date

deployments:
  - id: tushare-index-monthly
    name: 指数-月线行情
    schedules:
      - cron: "30 20 * * *"
        timezone: Asia/Shanghai
    execution:
      pool: default-process-pool
      concurrency_limit: 1
      tags:
        - tushare
        - index-monthly
      parameters:
        ts_code: ""
        trade_date: ""
        start_date: ""
        end_date: ""
        timeout: 30
